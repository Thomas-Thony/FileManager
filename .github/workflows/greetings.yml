name: Greetings

on: [pull_request_target, issues]

jobs:
  greeting:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write
    steps:
    - uses: actions/first-interaction@v1
      with:
        repo-token: ${{ secrets.GITHUB_TOKEN }}
        issue-message: "Congrat ! That's your first issue in this repo. We hope that you will contribute more to become an important developper of FileManager !"
        pr-message: "(Not ready yet) Hello World !"
